<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connection Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 400px;
        }
        h1 {
            color: #00FF00;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.1em;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        button {
            background: #cf1a37;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #a01529;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✓ Connection Test Successful</h1>
        <p>The connection to the server was successful. Click Continue to add this host.</p>
        <button onclick="continueToApp()" style="margin-right: 10px;">Continue</button>
        <button onclick="cancelAndReturn()" style="background: #555; border-color: #555;">Cancel</button>
    </div>
    <script>
        async function continueToApp() {
            // Check if running in Android WebView with bridge
            if (typeof AndroidBridge !== 'undefined') {
                AndroidBridge.closeWebView();
            } else {
                window.close();
            }
        }

        function cancelAndReturn() {
            // Clear pending host
            sessionStorage.removeItem('wmux_pending_host_name');
            sessionStorage.removeItem('wmux_pending_host_url');

            if (typeof AndroidBridge !== 'undefined') {
                AndroidBridge.closeWebView();
            } else {
                window.close();
            }
        }
    </script>
</body>
</html>
